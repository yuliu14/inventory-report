<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>公司库存预警</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<!-- XLSX: 主CDN用bootcdn(国内稳定)，jsdelivr做备用 -->
<script src="https://cdn.bootcdn.net/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

if(typeof XLSX==='undefined'){document.write('<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"><\/script>');}
</script>
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
:root{
  --bg:#f1f5f9;--card:#fff;--text:#1e293b;--text2:#64748b;--border:#e2e8f0;
  --shadow:0 1px 3px rgba(0,0,0,.06);--radius:10px;--nav-w:250px;
  --cBasic:#f8fafc;--cBasicB:#e2e8f0;--cBasicT:#475569;
  --cDOS:#eff6ff;--cDOSB:#bfdbfe;--cDOST:#1e40af;
  --cHealth:#f0fdf4;--cHealthB:#bbf7d0;--cHealthT:#166534;
  --cSales:#faf5ff;--cSalesB:#e9d5ff;--cSalesT:#6b21a8;
  --cAvg:#eef2ff;--cAvgB:#c7d2fe;--cAvgT:#3730a3;
  --cInv:#f0fdfa;--cInvB:#99f6e4;--cInvT:#134e4a;
  --cVal:#fffbeb;--cValB:#fde68a;--cValT:#92400e;
  --cAge:#fff1f2;--cAgeB:#fecdd3;--cAgeT:#9f1239;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden}

/* sidebar */
.nav-edit{font-size:9px;opacity:0;cursor:pointer;padding:0 3px;transition:opacity .15s;flex-shrink:0}
.nav-item .row:hover .nav-edit{opacity:0.6}
.nav-edit:hover{opacity:1!important}
.nav-label{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.sidebar{width:var(--nav-w);min-width:var(--nav-w);background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:10}
.sidebar-header{padding:14px 16px;border-bottom:1px solid var(--border)}
.sidebar-header h2{font-size:14px;color:#1e40af;display:flex;align-items:center;gap:6px}
.sidebar-header .sub{font-size:9px;color:var(--text2);margin-top:2px}
.nav-tree{flex:1;overflow-y:auto;padding:4px 0}
.nav-item{cursor:pointer;user-select:none}
.nav-item .row{display:flex;align-items:center;padding:7px 16px;gap:6px;font-size:11px;transition:.1s;border-left:3px solid transparent}
.nav-item .row:hover{background:var(--hover, #f8fafc)}
.nav-item.active>.row{background:#eff6ff;border-left-color:#3b82f6;color:#1e40af;font-weight:600}
.nav-item .icon{font-size:13px;width:16px;text-align:center}
.nav-item .badge{margin-left:auto;background:var(--border);color:var(--text2);font-size:9px;padding:1px 6px;border-radius:8px}
.nav-item.active .badge{background:#dbeafe;color:#1e40af}
.nav-children{display:none}
.nav-item.expanded>.nav-children{display:block}
.nav-children .row{padding-left:38px!important;font-size:10px!important}
.nav-children .nav-children .row{padding-left:54px!important}

/* main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:#fff;padding:10px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.topbar .breadcrumb{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:4px}
.topbar .breadcrumb span{color:var(--text);font-weight:600}
.topbar .actions{margin-left:auto;display:flex;gap:5px}
.search-box{padding:5px 10px;border:1px solid var(--border);border-radius:5px;font-size:11px;width:170px;outline:none}
.search-box:focus{border-color:#3b82f6}

.content{flex:1;overflow-y:auto;padding:12px 20px;display:flex;flex-direction:column;gap:10px}

/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px}
.kpi-card{background:var(--card);border-radius:8px;padding:10px 12px;box-shadow:var(--shadow);border-left:3px solid transparent}
.kpi-card .lbl{font-size:10px;letter-spacing:.2px;margin-bottom:2px}
.kpi-card .val{font-size:20px;font-weight:700}
.kpi-card .sub{font-size:9px;color:var(--text2)}
.kpi-card.k-dos{border-left-color:#3b82f6}.k-dos .lbl{color:#3b82f6}
.kpi-card.k-health{border-left-color:#10b981}.k-health .lbl{color:#10b981}
.kpi-card.k-sales{border-left-color:#8b5cf6}.k-sales .lbl{color:#8b5cf6}
.kpi-card.k-inv{border-left-color:#14b8a6}.k-inv .lbl{color:#14b8a6}
.kpi-card.k-val{border-left-color:#f59e0b}.k-val .lbl{color:#f59e0b}
.kpi-card.k-age{border-left-color:#e11d48}.k-age .lbl{color:#e11d48}

/* charts */
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.chart-wrap{position:relative;height:230px}
.chart-wrap canvas{width:100%!important;height:100%!important}

/* panel */
.panel{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.panel-hd{padding:9px 14px;border-bottom:1px solid var(--border);font-weight:600;font-size:12px;display:flex;align-items:center;gap:6px}
.panel-hd .hint{font-weight:400;font-size:9px;color:var(--text2);margin-left:4px}
.panel-bd{overflow-x:auto;max-height:58vh;overflow-y:auto}

/* table - colored section headers */
table{width:100%;border-collapse:collapse;font-size:10px}
.sec-hd th{padding:4px 5px;font-size:9px;font-weight:700;text-align:center;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:3;letter-spacing:.2px}
.col-hd th{padding:3px 5px;font-size:9px;font-weight:600;text-align:right;border-bottom:2px solid var(--border);position:sticky;top:20px;z-index:2;white-space:nowrap;color:var(--text2)}
.col-hd th:first-child,.col-hd th.col-l{text-align:left}

.sh-basic{background:var(--cBasicB);color:var(--cBasicT)}
.sh-dos{background:var(--cDOSB);color:var(--cDOST)}
.sh-health{background:var(--cHealthB);color:var(--cHealthT)}
.sh-sales{background:var(--cSalesB);color:var(--cSalesT)}
.sh-avg{background:var(--cAvgB);color:var(--cAvgT)}
.sh-inv{background:var(--cInvB);color:var(--cInvT)}
.sh-val{background:var(--cValB);color:var(--cValT)}
.sh-age{background:var(--cAgeB);color:var(--cAgeT)}

.ch-basic{background:var(--cBasic)}.ch-dos{background:var(--cDOS)}.ch-health{background:var(--cHealth)}
.ch-sales{background:var(--cSales)}.ch-avg{background:var(--cAvg)}.ch-inv{background:var(--cInv)}
.ch-val{background:var(--cVal)}.ch-age{background:var(--cAge)}

tbody td{padding:4px 5px;text-align:right;border-bottom:1px solid #f1f5f9;white-space:nowrap;font-size:10px}
tbody td:first-child{text-align:left;font-weight:500}
tbody tr:hover{background:#f8fafc}
.drill-link{color:#3b82f6;cursor:pointer;font-weight:600}
.drill-link:hover{text-decoration:underline}

/* editable */
.ed{background:#fffbe6;border-radius:2px;padding:1px 3px;display:inline-block;min-width:32px;text-align:right;cursor:pointer;font-size:10px}
.ed:hover{background:#fef3c7;outline:1.5px solid #f59e0b}
.ed:focus{background:#fff;outline:2px solid #3b82f6}

/* badges */
.badge{display:inline-block;padding:1px 6px;border-radius:8px;font-size:9px;font-weight:600}
.bg-g{background:#d1fae5;color:#065f46}.bg-y{background:#fef3c7;color:#92400e}
.bg-o{background:#ffedd5;color:#9a3412}.bg-r{background:#fee2e2;color:#991b1b}.bg-gray{background:#f1f5f9;color:#475569}

/* buttons */
.btn{padding:5px 10px;border:1px solid var(--border);border-radius:5px;font-size:10px;cursor:pointer;background:#fff;color:var(--text);transition:.1s;display:inline-flex;align-items:center;gap:3px}
.btn:hover{background:#f8fafc}
.btn-pri{background:#3b82f6;color:#fff;border-color:#3b82f6}.btn-pri:hover{background:#2563eb}
.btn-xs{padding:2px 5px;font-size:9px;border-radius:3px}

/* toast */
.toast{position:fixed;bottom:16px;right:16px;background:#1e293b;color:#fff;padding:8px 14px;border-radius:7px;font-size:11px;z-index:999;opacity:0;pointer-events:none;transition:opacity .3s}
.toast.show{opacity:1}.toast.ok{background:#059669}

/* modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:50;display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:12px;padding:18px;width:540px;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal.wide{width:98vw;max-width:1400px}
.modal h3{font-size:14px;margin-bottom:8px}
.modal .f-row{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.modal .f-row label{width:85px;font-size:10px;color:var(--text2);text-align:right;flex-shrink:0}
.modal .f-row input{flex:1;padding:4px 6px;border:1px solid var(--border);border-radius:4px;font-size:11px}
.modal .f-row input:focus{outline:none;border-color:#3b82f6}
.modal .f-acts{display:flex;gap:6px;justify-content:flex-end;margin-top:10px}
.modal .sec-tit{font-size:10px;font-weight:700;margin:8px 0 4px;padding:2px 6px;border-radius:3px}

/* alert panel */
.alert-panel{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);overflow:visible;margin-bottom:0}
.alert-summary{display:flex;align-items:center;gap:12px;padding:10px 16px;cursor:pointer;background:linear-gradient(135deg,#fff5f5,#fff);border-left:4px solid #ef4444}
.alert-summary:hover{background:linear-gradient(135deg,#fef2f2,#fff5f5)}
.alert-summary .a-title{font-weight:700;font-size:13px;display:flex;align-items:center;gap:6px}
.alert-summary .a-counts{display:flex;gap:10px;font-size:11px;margin-left:auto}
.alert-summary .a-counts span{display:flex;align-items:center;gap:3px;padding:2px 8px;border-radius:10px;font-weight:600}
.alert-list{padding:0;max-height:380px;overflow:auto;display:none}
.alert-list.open{display:block}
.alert-item{display:flex;align-items:center;gap:10px;padding:8px 16px;border-bottom:1px solid #f1f5f9;font-size:11px;transition:.1s}
.alert-item:hover{background:#fafafa}
.alert-item.lv-urgent{border-left:3px solid #dc2626;background:#fef2f2}
.alert-item.lv-high{border-left:3px solid #f97316;background:#fff7ed}
.alert-item.lv-medium{border-left:3px solid #eab308;background:#fefce8}
.alert-item.lv-low{border-left:3px solid #3b82f6;background:#eff6ff}
.alert-item .a-pri{font-weight:700;font-size:10px;padding:1px 6px;border-radius:4px;white-space:nowrap;min-width:44px;text-align:center}
.alert-item .a-sku{font-weight:600;min-width:140px}
.alert-item .a-name{color:var(--text2);min-width:80px}
.alert-item .a-store{min-width:70px;color:var(--text2)}
.alert-item .a-metric{text-align:right;min-width:70px}
.alert-item .a-metric .v{font-weight:600}
.alert-item .a-metric .lbl{font-size:9px;color:var(--text2)}
.alert-item .a-action{min-width:90px;text-align:right}
.alert-item .a-action .qty{font-weight:700;color:#dc2626;font-size:13px}
.pri-urgent{background:#fee2e2;color:#991b1b}
.pri-high{background:#ffedd5;color:#9a3412}
.pri-medium{background:#fef9c3;color:#854d0e}
.pri-low{background:#dbeafe;color:#1e40af}

@media(max-width:768px){.sidebar{display:none}.chart-row{grid-template-columns:1fr}.kpi-row{grid-template-columns:repeat(2,1fr)}}

  /* ===== 备货审核样式 ===== */
  .status-draft{background:#fef3c7;color:#92400e;font-weight:600;padding:2px 8px;border-radius:10px;font-size:10px}
  .status-pending{background:#dbeafe;color:#1e40af;font-weight:600;padding:2px 8px;border-radius:10px;font-size:10px}
  .status-approved{background:#d1fae5;color:#065f46;font-weight:600;padding:2px 8px;border-radius:10px;font-size:10px}
  .status-rejected{background:#fee2e2;color:#991b1b;font-weight:600;padding:2px 8px;border-radius:10px;font-size:10px}
  .status-partial{background:#ffedd5;color:#9a3412;font-weight:600;padding:2px 8px;border-radius:10px;font-size:10px}
  .ro-toolbar{display:flex;align-items:center;gap:10px;padding:10px 16px;background:#fff;border-bottom:1px solid var(--border);flex-shrink:0}
  .ro-toolbar .ro-title{font-weight:700;font-size:14px;display:flex;align-items:center;gap:6px}
  .ro-toolbar .ro-actions{margin-left:auto;display:flex;gap:5px}
  .ro-table{width:100%;border-collapse:collapse;font-size:11px}
  .ro-table th{background:#f8fafc;padding:8px 10px;text-align:left;font-size:10px;font-weight:600;color:var(--text2);border-bottom:2px solid var(--border);white-space:nowrap}
  .ro-table td{padding:7px 10px;border-bottom:1px solid #f1f5f9;white-space:nowrap}
  .ro-table tbody tr:hover{background:#f8fafc;cursor:pointer}
  .ro-table .ro-amount{text-align:right;font-weight:600;color:#dc2626}
  .ro-review-table{width:100%;border-collapse:collapse;font-size:10px;margin:10px 0}
  .ro-review-table th{background:#f8fafc;padding:5px 6px;text-align:left;font-size:9px;font-weight:600;color:var(--text2);border-bottom:2px solid var(--border);position:sticky;top:0;z-index:2}
  .ro-review-table td{padding:4px 6px;border-bottom:1px solid #f1f5f9}
  .ro-review-table input[type="number"]{width:65px;padding:3px 5px;border:1px solid var(--border);border-radius:3px;font-size:10px;text-align:right}
  .ro-review-table input[type="number"]:focus{outline:none;border-color:#3b82f6}
  .ro-review-table textarea{width:100%;padding:3px 5px;border:1px solid var(--border);border-radius:3px;font-size:10px;resize:vertical;min-height:28px;font-family:inherit}
  .ro-summary{display:flex;gap:16px;padding:10px 14px;background:#f8fafc;border-radius:6px;font-size:11px;margin:10px 0}
  .ro-summary .ro-sum-item{display:flex;flex-direction:column;align-items:center}
  .ro-summary .ro-sum-val{font-weight:700;font-size:16px}
  .ro-summary .ro-sum-lbl{font-size:9px;color:var(--text2)}
  .ro-empty{text-align:center;padding:60px 20px;color:var(--text2)}
  .ro-empty .ro-empty-icon{font-size:48px;margin-bottom:12px}
  .ro-empty .ro-empty-text{font-size:13px;margin-bottom:6px}
  .ro-empty .ro-empty-hint{font-size:10px;color:#94a3b8}
  .ro-filter-btn{padding:4px 10px;border:1.5px solid var(--border);border-radius:15px;font-size:10px;cursor:pointer;background:#fff;color:var(--text2);transition:.15s}
  .ro-filter-btn:hover,.ro-filter-btn.active{background:#eff6ff;border-color:#3b82f6;color:#1e40af;font-weight:600}
  /* summary row */
  .summary-row td{font-weight:700!important;background:#f0f9ff!important;border-top:2px solid #3b82f6!important;border-bottom:2px solid #3b82f6!important;font-size:10px}
  .summary-row{position:sticky;bottom:0;z-index:5}
  .summary-row td:first-child{color:#1e40af}

  /* remark */
  .remark-btn{cursor:pointer;font-size:12px;opacity:0.5;transition:opacity .15s;background:none;border:none;padding:1px 3px}
  .remark-btn:hover{opacity:1}
  .remark-btn.has-note{opacity:1;background:#fef3c7;border-radius:3px;padding:2px 5px}
  .remark-popup{position:absolute;background:#fff;border:1px solid #e2e8f0;border-radius:8px;box-shadow:0 10px 30px rgba(0,0,0,.15);padding:10px;z-index:30;min-width:220px}
  .remark-popup textarea{width:100%;border:1px solid #e2e8f0;border-radius:5px;padding:6px;font-size:11px;resize:vertical;min-height:60px;font-family:inherit}
  .remark-popup textarea:focus{outline:none;border-color:#3b82f6}
  .remark-popup .r-acts{display:flex;gap:4px;justify-content:flex-end;margin-top:5px}

  /* product tag badge */
  .tag-new{background:#dbeafe;color:#1e40af}.tag-old{background:#f1f5f9;color:#64748b}

  /* DOS highlight row */
  .hl-row td{background:#fef3c7!important}
  .hl-row td:first-child{font-weight:700}

  /* login overlay */
  .login-overlay{position:fixed;inset:0;background:linear-gradient(135deg,#1e3a5f,#2563eb);z-index:100;display:flex;align-items:center;justify-content:center;font-family:-apple-system,'Microsoft YaHei',sans-serif}
  .login-box{background:#fff;border-radius:14px;padding:32px 28px;width:380px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
  .login-box h2{font-size:18px;text-align:center;margin-bottom:4px;color:#1e3a5f}
  .login-box .sub{text-align:center;font-size:11px;color:#64748b;margin-bottom:20px}
  .login-box label{display:block;font-size:11px;font-weight:600;color:#475569;margin-bottom:4px;margin-top:12px}
  .login-box select,.login-box input{width:100%;padding:8px 10px;border:1.5px solid #e2e8f0;border-radius:7px;font-size:13px;outline:none;font-family:inherit}
  .login-box select:focus,.login-box input:focus{border-color:#3b82f6}
  .login-box .err{color:#e11d48;font-size:10px;margin-top:4px;min-height:16px}
  .login-box .btn-row{display:flex;gap:8px;margin-top:16px}
  .login-box .btn-login{flex:1;padding:9px;background:#2563eb;color:#fff;border:none;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer}
  .login-box .btn-login:hover{background:#1d4ed8}
  .login-box .btn-admin{padding:9px 14px;background:#fff;color:#64748b;border:1.5px solid #e2e8f0;border-radius:7px;font-size:11px;cursor:pointer}
  .login-box .btn-admin:hover{background:#f8fafc}
  .topbar .auth-badge{font-size:10px;background:#eff6ff;color:#1e40af;padding:3px 8px;border-radius:10px;display:flex;align-items:center;gap:4px}
  .topbar .auth-badge .btn-switch{font-size:9px;cursor:pointer;color:#64748b;margin-left:2px}
  .topbar .auth-badge .btn-switch:hover{color:#e11d48}
</style>

<body>

<!-- Login overlay -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <h2>🔒 库存预警系统</h2>
    <div class="sub">请选择部门并输入密码</div>
    <label>部门</label>
    <select id="loginDept"><option value="">-- 选择部门 --</option></select>
    <label>密码</label>
    <input type="password" id="loginPwd" placeholder="输入部门密码" onkeydown="if(event.key==='Enter')doLogin()" />
    <div class="err" id="loginErr"></div>
    <div class="btn-row">
      <button class="btn-login" onclick="doLogin()">🔓 解锁</button>
      <button class="btn-admin" onclick="doAdminLogin()">👑 管理员</button>
    </div>
  </div>
</div>

<aside class="sidebar">
  <div class="sidebar-header">
    <h2>📊 公司库存预警</h2>
    <div class="sub">基于预计日销 · 库存预警</div>
  </div>
  <div class="nav-tree" id="navTree"></div>
</aside>

<div class="main">
  <div class="topbar">
    <div class="breadcrumb" id="breadcrumb">📋 <span>部门总览</span></div>
    <span class="auth-badge" id="authBadge"></span>
    <input class="search-box" id="searchInput" placeholder="🔍 搜索SKU/SPU/品名..." />
    <div class="actions">
      <button class="btn" onclick="openChangePwd()">🔑 改密</button>
      <button class="btn" onclick="openAlertSettings()">⚙️ 参数设置</button>
      <button class="btn" onclick="openAddSKU()">➕ 新增SKU</button>
      <button class="btn" onclick="downloadTemplate()">📥 下载模板</button>
      <button class="btn btn-pri" onclick="document.getElementById('importFile').click()">📤 导入Excel</button>
      <input type="file" id="importFile" accept=".xlsx,.xls" style="display:none" onchange="importExcel(this)" />
      <button class="btn" onclick="resetAll()">🔄 重置</button>
      <button class="btn btn-pri" onclick="saveData()">💾 <span id="autoSaveBadge"></span>保存</button>
      <button class="btn btn-pri" onclick="exportData()">📥 导出CSV</button>
    </div>
  </div>
  <div class="content" id="mainContent"></div>
</div>

<div class="modal-overlay" id="editModal" style="display:none">
  <div class="modal" id="editModalContent"></div>
</div>
<div class="toast" id="toast"></div>

<script>
// ============================================================
// 🔥 FIREBASE + FIRESTORE 数据同步层（多用户云端共享）
// 如果 Firebase SDK 加载失败，自动降级到纯 localStorage
// ============================================================

// 启动：匿名登录 + 监听 Firestore 实时数据
// 返回 Promise，首次数据加载完成后 resolve
function fireInit(){
  if(!_fireAvailable){
    console.log('📦 本地存储模式（Firebase 不可用）');
    _fireReady = true;
    return Promise.resolve();
  }
  return new Promise(function(resolve){
    auth.signInAnonymously().then(function(){
      console.log('🔥 Firebase 匿名登录成功');
      var firstCall = true;
      // 实时监听云端数据变化
      _fireUnsub = db.collection('sharedData').doc('main').onSnapshot(function(doc){
        if(!doc.exists){
          console.log('📡 云端尚无数据，将使用本地数据初始化');
          _fireReady = true;
          _fireData = {};
          if(firstCall){ firstCall = false; resolve(); }
          return;
        }
        var serverData = doc.data();
        // 去掉元数据字段
        delete serverData._updatedAt;
        _fireData = serverData;

        if(!_fireReady){
          // 首次加载：用云端数据覆盖 localStorage
          var keys = ['skuData','replenOrders','deptPasswords','adminPwd','healthCfg','alertCfg','predictCfg','processedAlerts','trendData','opLog','aggRemarks'];
          var count = 0;
          keys.forEach(function(k){
            if(serverData[k] !== undefined){
              localStorage.setItem(k, JSON.stringify(serverData[k]));
              count++;
            }
          });
          console.log('📡 已从云端加载数据: '+count+'/'+keys.length+' 项, '+(serverData.skuData||[]).length+' SKU, '+(serverData.replenOrders||[]).length+' 补货单');
          _fireReady = true;
          if(firstCall){ firstCall = false; resolve(); }
        }else if(!_fireSaveBusy && (Date.now() - _fireLastSave) > 3000){
          // 外部变更（其他用户/标签页修改了数据）：更新 localStorage
          // 冷却期 3 秒内跳过，防止自己的写入触发回执刷新
          Object.keys(serverData).forEach(function(k){
            if(serverData[k] !== undefined){
              localStorage.setItem(k, JSON.stringify(serverData[k]));
            }
          });
          console.log('📡 检测到云端数据更新，已同步到本地');
          // 静默刷新内存变量和界面
          reloadFromStorage();
          refresh();
          initNav();
        }
      }, function(err){
        console.warn('⚠️ Firestore 监听失败，降级到本地存储:', err.message);
        _fireReady = true;
        if(firstCall){ firstCall = false; resolve(); }
      });
    }).catch(function(err){
      console.warn('⚠️ Firebase 匿名登录失败，降级到本地存储模式:', err.message);
      _fireReady = true;
      resolve();
    });
  });
}

// 保存单个 key 到 localStorage + Firestore
function syncSave(key, value){
  localStorage.setItem(key, JSON.stringify(value));
  if(!_fireAvailable || !_fireReady) return;
  // 防抖：同一 key 的多次保存合并
  _fsQueue = _fsQueue.filter(function(item){return item.key !== key;});
  _fsQueue.push({key: key, value: value});
  clearTimeout(_fsTimer);
  _fsTimer = setTimeout(flushFirestore, 500);
}

// 批量写入 Firestore
function flushFirestore(){
  if(!_fsQueue.length || !_fireAvailable || !_fireReady) return;
  var batch = {};
  _fsQueue.forEach(function(item){ batch[item.key] = item.value; });
  _fsQueue = [];
  batch._updatedAt = firebase.firestore.FieldValue.serverTimestamp();
  _fireSaveBusy = true;
  _fireLastSave = Date.now();
  db.collection('sharedData').doc('main').set(batch, {merge: true})
    .then(function(){
      _fireSaveBusy = false;
      console.log('☁️ 已同步到云端: '+Object.keys(batch).filter(function(k){return k!=='_updatedAt';}).join(', '));
    })
    .catch(function(e){
      _fireSaveBusy = false;
      console.warn('⚠️ Firestore 写入失败:', e.message);
    });
}

// 页面关闭前确保写入
window.addEventListener('beforeunload', function(){
  if(_fsQueue.length && _fireAvailable && _fireReady){
    var batch = {};
    _fsQueue.forEach(function(item){ batch[item.key] = item.value; });
    _fsQueue = [];
    db.collection('sharedData').doc('main').set(batch, {merge: true}).catch(function(){});
  }
});

// syncLoad 从 localStorage 读取（数据已在 fireInit 时从云端同步）
function syncLoad(key){
  return Promise.resolve().then(function(){
    var local = localStorage.getItem(key);
    return local ? JSON.parse(local) : null;
  });
}

var predictCfg={w7:0.10,w14:0.20,w30:0.30,whist:0.40};

function calcPredictSales(r){
  if(r._manualPredict)return;
  var v7=r["7天日均销量"]||0;
  var v14=r["14天日均销量"]||0;
  var v30=r["30天日均销量"]||0;
  var vhist=r["历年同时期日销"]||0;
  var totalW=0, totalV=0;
  if(v7>0){totalW+=predictCfg.w7; totalV+=v7*predictCfg.w7;}
  if(v14>0){totalW+=predictCfg.w14; totalV+=v14*predictCfg.w14;}
  if(v30>0){totalW+=predictCfg.w30; totalV+=v30*predictCfg.w30;}
  if(vhist>0){totalW+=predictCfg.whist; totalV+=vhist*predictCfg.whist;}
  if(totalW>0)r["预估日销"]=Math.round(totalV/totalW*100)/100;
  else r["预估日销"]=v30||v14||v7||0.1;
}
loadPredictCfg();

function calcDOS(r){
  calcPredictSales(r);
  var ds=r['预估日销']||r['30天日均销量']||0.1;
  r['国内在制DOS']=(r['国内在制']||0)/ds;
  r['国内库存DOS']=(r['国内现货']||0)/ds;
  r['在途DOS']=(r['FBA在途数量']||0)/ds;
  r['FBA可售DOS']=(r['FBA在库数量']||0)/ds;
  r['FBM可售DOS']=(r['fbm可售']||0)/ds;
  // Health
  r['国内在制健康度']=healthLabel(r['国内在制DOS']);
  r['国内现货健康度']=healthLabel(r['国内库存DOS']);
  r['在途健康度']=healthLabel(r['在途DOS']);
  r['可售健康度']=healthLabel(Math.max(r['FBA可售DOS'],r['FBM可售DOS']));
  // Totals
  r['国内总库存']=(r['国内在制']||0)+(r['国内现货']||0);
  r['总库存']=r['国内总库存']+(r['FBA在途数量']||0)+(r['FBA在库数量']||0)+(r['fbm可售']||0);
  r['总DOS']=r['总库存']/ds;
  // Value
  var pr=parseFloat(String(r['售价']||'$0').replace('$',''))||0;
  r['海外现货货值']=(r['FBA在库数量']||0)*pr;
  r['海外在途货值']=(r['FBA在途数量']||0)*pr;
  r['国内现货货值']=(r['国内现货']||0)*pr;
  r['国内在制货值']=(r['国内在制']||0)*pr;
  // Aging >180 total
  r['大于180天库存合计']=(r['181-270天库龄数量']||0)+(r['271-330天库龄数量']||0)+(r['331-365天库龄数量']||0)+(r['大于365天库龄数量']||0);
}

function healthLabel(dos){
  if(dos<=0)return{lv:'gray',lb:'无库存',c:'bg-gray'};
  if(dos<healthCfg.green)return{lv:'green',lb:'健康',c:'bg-g'};
  if(dos<healthCfg.yellow)return{lv:'yellow',lb:'注意',c:'bg-y'};
  if(dos<healthCfg.orange)return{lv:'orange',lb:'警告',c:'bg-o'};
  return{lv:'red',lb:'滞销',c:'bg-r'};
}

function grpBy(k,d){var g={};d.forEach(function(r){var v=r[k]||'未知';if(!g[v])g[v]=[];g[v].push(r);});return g;}
function sumF(rs,f){return rs.reduce(function(s,r){return s+(Number(r[f])||0);},0);}
function wAvg(rs,f,wf){
  var ts=0,w=0;
  rs.forEach(function(r){var wt=Number(r[wf])||0,v=Number(r[f])||0;if(wt>0){ts+=wt;w+=v*wt;}});
  return ts>0?w/ts:0;
}

function agg(rs){
  var a={count:rs.length};
  a['国内在制DOS']=wAvg(rs,'国内在制DOS','预估日销');
  a['国内库存DOS']=wAvg(rs,'国内库存DOS','预估日销');
  a['在途DOS']=wAvg(rs,'在途DOS','预估日销');
  a['FBA可售DOS']=wAvg(rs,'FBA可售DOS','预估日销');
  a['FBM可售DOS']=wAvg(rs,'FBM可售DOS','预估日销');
  a['国内在制健康度']=healthLabel(a['国内在制DOS']);
  a['国内现货健康度']=healthLabel(a['国内库存DOS']);
  a['在途健康度']=healthLabel(a['在途DOS']);
  a['可售健康度']=healthLabel(Math.max(a['FBA可售DOS'],a['FBM可售DOS']));
  a['预估日销']=sumF(rs,'预估日销');
  a['7天日均']=sumF(rs,'7天日均销量');
  a['14天日均']=sumF(rs,'14天日均销量');
  a['30天日均']=sumF(rs,'30天日均销量');
  a['历年同期']=sumF(rs,'历年同时期日销');
  a['国内在制']=sumF(rs,'国内在制');a['国内现货']=sumF(rs,'国内现货');
  a['国内总库存']=sumF(rs,'国内总库存');
  a['FBA在途数量']=sumF(rs,'FBA在途数量');a['FBA在库数量']=sumF(rs,'FBA在库数量');
  a['fbm可售']=sumF(rs,'fbm可售');a['总库存']=sumF(rs,'总库存');
  a['海外现货货值']=sumF(rs,'海外现货货值');a['海外在途货值']=sumF(rs,'海外在途货值');
  a['国内现货货值']=sumF(rs,'国内现货货值');a['国内在制货值']=sumF(rs,'国内在制货值');
  a['大于180天库存合计']=sumF(rs,'大于180天库存合计');
  ['0-30天库龄数量','31-60天库龄数量','61-90天库龄数量','91-180天库龄数量',
   '181-270天库龄数量','271-330天库龄数量','331-365天库龄数量','大于365天库龄数量']
    .forEach(function(k){a[k]=sumF(rs,k);});
  a['总DOS']=a['预估日销']>0?(a['总库存']||0)/a['预估日销']:0;
  return a;
}

function navClickReplen(el,view){

function navClick(el,level,dept,store,spu){
  if(el.querySelector('.nav-children'))el.classList.toggle('expanded');
  document.querySelectorAll('.nav-item').forEach(function(n){n.classList.remove('active');});
  el.classList.add('active');
  currentView={level:level,dept:dept,store:store,spu:spu};
  renderView();
  var p=['📋'];if(dept)p.push(dept);if(store)p.push(store);if(spu)p.push(spu);if(p.length===1)p.push('部门总览');

function findNav(lv,d,s,sp){
  var els=document.querySelectorAll('.nav-item');
  for(var i=0;i<els.length;i++){
    var el=els[i];
    if(el.dataset.level===lv&&el.dataset.dept===d&&(!s||el.dataset.store===s)&&(!sp||el.dataset.spu===sp))return el;
  }
  return els[0];
}

function renderView(){
  var lv=currentView.level,dept=currentView.dept,store=currentView.store,spu=currentView.spu;

  if(authDept&&dept&&dept!==authDept){dept=authDept;currentView.dept=dept;currentView.store=null;currentView.spu=null;}
  if(dept)f=f.filter(function(r){return r['部门']===dept;});
  if(store)f=f.filter(function(r){return r['店铺']===store;});
  if(spu)f=f.filter(function(r){return r['spu']===spu;});
  if(lv==='dept'&&!dept)renderDept();

// 兼容旧格式：旧数据 key=skuId(数字), 新格式 key="skuId|type"
function alertKey(skuId,type){return skuId+'|'+type;}
function isAlertProcessed(skuId,type){
  var newKey=alertKey(skuId,type);
  if(processedAlerts[newKey]!==undefined)return !!processedAlerts[newKey];
  // 兼容旧格式：纯数字key视为"全部类型已处理"
  if(processedAlerts[skuId]!==undefined&&typeof processedAlerts[skuId]==='number')return !!processedAlerts[skuId];
  return false;
}
function saveProcessedAlerts(){try{syncSave('processedAlerts',processedAlerts);}catch(e){}}
function markAlertProcessed(skuId,type){
  var key=alertKey(skuId,type);
  processedAlerts[key]=processedAlerts[key]?0:Date.now();
  saveProcessedAlerts();
  // 保存两个面板的展开状态
  var stockPanel=document.querySelector('.alert-summary[style*="#fef2f2"]');
  var overPanel=document.querySelector('.alert-summary[style*="#fefce8"]');
  if(stockPanel){var lst=stockPanel.nextElementSibling;window._stockOpen=lst&&lst.classList.contains('open');}
  if(overPanel){var lst2=overPanel.nextElementSibling;window._overOpen=lst2&&lst2.classList.contains('open');}
  refresh();
}

function recordTrend(){

    var stale=a['大于180天库存合计']||0;
    var total=a['总库存']||1;
    var entry={t:new Date().toISOString().slice(0,16),sku:a.count,inv:a['总库存']||0,dos:a['总库存']/(a['预估日销']||1),stale:stale/total*100};

}

var replenOrders=[];

function roStatusLabel(s){
  var m={draft:'草稿',pending:'待审核',approved:'已通过',rejected:'已驳回',partial:'部分通过'};
  return '<span class="status-'+s+'">'+(m[s]||s)+'</span>';
}
function roNextId(){return 'RO-'+Date.now()+'-'+Math.random().toString(36).slice(2,6).toUpperCase();}
function getReplenOrders(filterDept){
  // filterDept: null=all (admin), string=specific dept
  var orders=replenOrders.slice();
  if(filterDept)orders=orders.filter(function(o){return o.dept===filterDept;});
  if(_roFilter!=='all')orders=orders.filter(function(o){return o.status===_roFilter;});
  orders.sort(function(a,b){return (b._created||0)-(a._created||0);});
  return orders;
}
function getPendingCount(dept){
  return replenOrders.filter(function(o){return o.status==='pending'&&(!dept||o.dept===dept);}).length;
}
function createReplenOrder(items,dept,creator){
  var order={
    _id:roNextId(),_created:Date.now(),_createdBy:creator||dept,
    dept:dept,status:'draft',_submitted:null,_reviewed:null,_reviewer:null,_reviewNote:'',
    items:items.map(function(it,i){
      var sku=skuData.find(function(r){return r._id===it.skuId;});
      // 从 generateROFromAlerts 传入的字段直接保留，缺失字段从SKU补充
      var obj={skuId:it.skuId, approvedQty:0, note:''};
      var fields=['SKU','spu','品名','店铺','国家',
        'dosWIP','dosDomestic','dosTransit','dosFBA','dosFBM','dosTotal',
        'wip','domestic','transit','fba','fbm','totalInv',
        'dailySales','avg7','avg14','avg30','hist',
        'age0','age31','age61','age91','age181','age271','age331','age365','age180',
        'valOverseas','valDomestic','unitPrice',
        'currentStock','currentDOS','suggestQty','requestQty'];
      fields.forEach(function(f){
        if(it[f]!==undefined)obj[f]=it[f];
        else if(sku&&sku[f]!==undefined)obj[f]=sku[f];
        else obj[f]=0;
      });
      if(!obj.unitPrice)obj.unitPrice=sku?parseFloat(String(sku['售价']||'0').replace('$',''))||0:0;
      return obj;
    })
  };
  replenOrders.unshift(order);
  saveReplenOrders();
  logOp('创建补货单',order._id+' ('+order.items.length+'个SKU)');
  return order;
}
function updateReplenOrder(orderId,updates){
  var idx=-1;for(var i=0;i<replenOrders.length;i++){if(replenOrders[i]._id===orderId){idx=i;break;}}
  if(idx<0)return null;
  for(var k in updates){if(updates.hasOwnProperty(k))replenOrders[idx][k]=updates[k];}
  saveReplenOrders();
  return replenOrders[idx];
}
function deleteReplenOrder(orderId){
  var idx=-1;for(var i=0;i<replenOrders.length;i++){if(replenOrders[i]._id===orderId){idx=i;break;}}
  if(idx<0)return false;
  var removed=replenOrders.splice(idx,1)[0];
  saveReplenOrders();
  logOp('删除补货单',removed._id);
  return true;
}
function submitReplenOrder(orderId){
  var order=updateReplenOrder(orderId,{status:'pending',_submitted:Date.now()});
  if(order)logOp('提交审核',orderId+' ('+order.items.length+'个SKU)');
  return order;
}

function calcPredictSales(r){
  if(r._manualPredict)return; // 用户手动设置了预计日销，不自动覆盖
  var v7=r["7天日均销量"]||0;
  var v14=r["14天日均销量"]||0;
  var v30=r["30天日均销量"]||0;
  var vhist=r["历年同时期日销"]||0;
  var totalW=0, totalV=0;
  if(v7>0){totalW+=predictCfg.w7; totalV+=v7*predictCfg.w7;}
  if(v14>0){totalW+=predictCfg.w14; totalV+=v14*predictCfg.w14;}
  if(v30>0){totalW+=predictCfg.w30; totalV+=v30*predictCfg.w30;}
  if(vhist>0){totalW+=predictCfg.whist; totalV+=vhist*predictCfg.whist;}
  if(totalW>0)r["预估日销"]=Math.round(totalV/totalW*100)/100;
  else r["预估日销"]=v30||v14||v7||0.1;
}

function saveAlertSettings(){
  // Save health thresholds
  ["green","yellow","orange"].forEach(function(k){var inp=document.getElementById("health_"+k);if(inp)healthCfg[k]=parseFloat(inp.value)||healthCfg[k];});
  var pwSum=0;["w7","w14","w30","whist"].forEach(function(k){var inp=document.getElementById("pw_"+k);if(inp){var v=parseInt(inp.value)||0;predictCfg[k]=v/100;pwSum+=v;}});
  if(pwSum>0&&pwSum!==100){["w7","w14","w30","whist"].forEach(function(k){predictCfg[k]=predictCfg[k]/(pwSum/100);});}
  savePredictCfg();
  // Save DOS thresholds (both stockout and overstock)
  ["stockFBA","stockFBM","stockDomestic","overDOS","overAging"].forEach(function(key){
    for(var j=0;j<4;j++){
      var inp=document.getElementById("cfg_"+key+"_"+j);
      if(inp)alertCfg[key][j]=parseFloat(inp.value)||alertCfg[key][j];
    }
  });
  saveAlertCfg();
  clsModal();
  refresh();
  showToast("✅ 参数已保存，预警清单+健康度+预测公式已刷新");
}

function getAlerts(){
  var alerts=[];
  var authData=getAuthData();
  if(!authData||!authData.length)return alerts;
  var levelOrder=['urgent','high','medium','low'];
  var labels={urgent:'紧急',high:'高风险',medium:'中风险',low:'关注'};
  authData.forEach(function(r){
    var daily=r['预估日销']||r['30天日均销量']||0;
    var sellable=(r['FBA在库数量']||0)+(r['fbm可售']||0);
    var totalInv=r['总库存']||0;
    if(totalInv<=0)return; // skip items with zero inventory

    // === 断货预警 (stockout): sellable DOS too low ===
    var stockChecks=[
      {val:r['FBA可售DOS']||0,qty:r['FBA在库数量']||0,key:'stockFBA'},
      {val:r['FBM可售DOS']||0,qty:r['fbm可售']||0,key:'stockFBM'},
      {val:r['国内库存DOS']||0,qty:r['国内现货']||0,key:'stockDomestic'}
    ];
    // All active channels must be below threshold (products without a channel are not penalized)
    for(var li=0;li<4;li++){
      var allPass=true,hasActive=false;
      for(var si=0;si<stockChecks.length;si++){
        var sc=stockChecks[si];
        if(sc.qty>0){hasActive=true;if(sc.val>alertCfg[sc.key][li]){allPass=false;break;}}
      }
      if(allPass&&hasActive){
        alerts.push({
          sku:r,type:'stockout',level:levelOrder[li],label:labels[levelOrder[li]],
          reason:'可售DOS偏低，建议补货',
          dosWIP:r['国内在制DOS']||0,dosDomestic:r['国内库存DOS']||0,
          dosTransit:r['在途DOS']||0,dosFBA:r['FBA可售DOS']||0,dosFBM:r['FBM可售DOS']||0,
          wip:r['国内在制']||0,domestic:r['国内现货']||0,
          transit:r['FBA在途数量']||0,fba:r['FBA在库数量']||0,fbm:r['fbm可售']||0,
          sellable:sellable,daily:daily,suggested:Math.max(0,Math.ceil(daily*60-sellable-(r['FBA在途数量']||0)))
        });
        break;
      }
    }

    // === 滞销预警 (overstock): DOS too high or aging too much ===
    var totalDOS=r['总DOS']||0;
    var agingRatio=totalInv>0?((r['大于180天库存合计']||0)/totalInv*100):0;
    for(var oi=0;oi<4;oi++){
      if(totalDOS>=alertCfg.overDOS[oi]||agingRatio>=alertCfg.overAging[oi]){
        var reasons=[];
        if(totalDOS>=alertCfg.overDOS[oi])reasons.push('总DOS '+totalDOS.toFixed(0)+'天≥'+alertCfg.overDOS[oi]);
        if(agingRatio>=alertCfg.overAging[oi])reasons.push('长库龄占比 '+agingRatio.toFixed(0)+'%≥'+alertCfg.overAging[oi]);
        alerts.push({
          sku:r,type:'overstock',level:levelOrder[oi],label:labels[levelOrder[oi]],
          reason:reasons.join('; '),
          dosWIP:r['国内在制DOS']||0,dosDomestic:r['国内库存DOS']||0,
          dosTransit:r['在途DOS']||0,dosFBA:r['FBA可售DOS']||0,dosFBM:r['FBM可售DOS']||0,
          wip:r['国内在制']||0,domestic:r['国内现货']||0,
          transit:r['FBA在途数量']||0,fba:r['FBA在库数量']||0,fbm:r['fbm可售']||0,
          sellable:sellable,daily:daily,suggested:Math.ceil(agingRatio),
          totalDOS:totalDOS,agingRatio:agingRatio
        });
        break;
      }
    }
  });
  var order={urgent:0,high:1,medium:2,low:3};
  alerts.sort(function(a,b){return order[a.level]-order[b.level]||b.suggested-a.suggested;});
  return alerts;
}

  var ck=alertCheckKey(skuId,type);
  window._alertChecks[ck]=!window._alertChecks[ck];

  var sp=document.querySelector('.alert-list.open');

function toggleAllStockoutChecks(){
  var alerts=getAlerts();
  var stockAlerts=alerts.filter(function(a){return a.type==='stockout'&&!isAlertProcessed(a.sku._id,a.type);});
  if(!stockAlerts.length)return;
  var anyUnchecked=stockAlerts.some(function(a){return !isAlertChecked(a.sku._id,'stockout');});
  stockAlerts.forEach(function(a){setAlertCheck(a.sku._id,'stockout',anyUnchecked);});
  saveAlertChecks();
  // 保持面板状态
  var sp=document.querySelector('.alert-list.open');
  window._stockOpen=!!sp;
  refresh();
}

      // 日销数据
      dailySales:s.预估日销||0, avg7:s['7天日均销量']||0, avg14:s['14天日均销量']||0,
      avg30:s['30天日均销量']||0, hist:s['历年同时期日销']||0,
      // 库龄数据
      age0:s['0-30天库龄数量']||0, age31:s['31-60天库龄数量']||0, age61:s['61-90天库龄数量']||0,
      age91:s['91-180天库龄数量']||0, age181:s['181-270天库龄数量']||0, age271:s['271-330天库龄数量']||0,
      age331:s['331-365天库龄数量']||0, age365:s['大于365天库龄数量']||0, age180:s['大于180天库存合计']||0,
      // 货值

      currentStock:a.sellable||0, currentDOS:Math.max(a.dosFBA||0,a.dosFBM||0,a.dosDomestic||0),
      suggestQty:a.suggested||0, requestQty:a.suggested||0, approvedQty:0,
      note:''
    };
  });
  var order=createReplenOrder(items,dept,dept);
  // 自动标记这些SKU的**断货**预警为已处理（不影响滞销预警）
  var markedKeys=[];
  stockoutAlerts.forEach(function(a){
    var key=alertKey(a.sku._id,'stockout');
    if(!processedAlerts[key]){processedAlerts[key]=Date.now();markedKeys.push(key);}
  });
  saveProcessedAlerts();
  showToast('✅ 已生成补货单: '+order._id+' ('+items.length+'个SKU) | 断货预警已归档');
  // Navigate to replenishment view
  var el=document.querySelector('.nav-item[data-view="myOrders"]');
  if(el)navClickReplen(el,'myOrders');
  // 提供撤销入口
  if(markedKeys.length>0){
    window._lastROUndo=function(){
      markedKeys.forEach(function(key){delete processedAlerts[key];});
      saveProcessedAlerts();
      window._lastROUndo=null;
      refresh();
      showToast('↩️ 已撤销归档，预警已恢复');
    };
    setTimeout(function(){
      if(window._lastROUndo){
        var t=document.getElementById('toast');
        if(t&&t.classList.contains('show')){
          t.innerHTML=t.textContent+' <button onclick="if(window._lastROUndo)window._lastROUndo()" style="background:#fff;color:#1e40af;border:none;padding:2px 8px;border-radius:3px;cursor:pointer;font-size:10px;margin-left:6px">↩ 撤销归档</button>';
        }
      }
    },100);
  }
}

function updateROItemQty(orderId,idx,val){
  var qty=parseInt(val)||0;
  var order=replenOrders.find(function(o){return o._id===orderId;});
  if(!order||!order.items[idx])return;
  order.items[idx].requestQty=Math.max(0,qty);
  saveReplenOrders();
}

function updateROApproveQty(orderId,idx,val){
  var qty=parseInt(val)||0;
  var order=replenOrders.find(function(o){return o._id===orderId;});
  if(!order||!order.items[idx])return;
  order.items[idx].approvedQty=Math.max(0,qty);
  saveReplenOrders();
}

function submitRO(orderId){
  if(!confirm('确定提交此补货单进行审核？提交后不可修改。'))return;
  submitReplenOrder(orderId);
  clsModal();
  renderReplenView(currentView.view||'myOrders');
  showToast('✅ 补货单已提交审核');
}

function reviewRO(orderId,action){
  var note=document.getElementById('ro_note');
  var reviewNote=note?note.value.trim():'';
  var order=replenOrders.find(function(o){return o._id===orderId;});
  if(!order)return;
  if(action==='rejected'&&!reviewNote){if(!confirm('未填写审核意见，确定驳回？'))return;}

  // 先读取页面上所有审核数量输入框的当前值（防止 oninput 还没触发）
  order.items.forEach(function(it,i){
    var inp=document.getElementById('ro_apv_'+i);
    if(inp){var v=parseInt(inp.value);if(!isNaN(v)&&v>=0){it.approvedQty=v;}}
  });

  // 通过时：只给"未手动设置过"的项自动填入申请数量
  if(action==='approved'){
    order.items.forEach(function(it){
      if(!it.approvedQty)it.approvedQty=it.requestQty;
    });
  }

  var auth=getAuth();
  updateReplenOrder(orderId,{status:action, _reviewed:Date.now(), _reviewer:auth?auth.isAdmin?'管理员':auth.dept:'', _reviewNote:reviewNote});

  // ====== 审核通过时，自动更新库存 ======
  if(action==='approved' && !order._inventoryUpdated){
    var updatedCount = 0;
    order.items.forEach(function(it){
      if(!it.approvedQty || it.approvedQty <= 0) return;
      var sku = skuData.find(function(r){return r._id === it.skuId;});
      if(!sku) return;
      // 国内现货减少，FBA在途增加
      sku['国内现货'] = Math.max(0, (sku['国内现货']||0) - it.approvedQty);
      sku['FBA在途数量'] = (sku['FBA在途数量']||0) + it.approvedQty;
      calcDOS(sku);
      sku._orig = JSON.parse(JSON.stringify(sku));
      updatedCount++;
    });
    if(updatedCount > 0){
      order._inventoryUpdated = true;
      syncSave('skuData', skuData);
      logOp('库存自动更新','补货单'+orderId+'通过: '+updatedCount+'个SKU, 国内现货→FBA在途');
      console.log('📦 库存已自动更新: '+updatedCount+'个SKU, 国内现货减少→FBA在途增加');
    }
  }
  // ====== 库存更新结束 ======

  saveReplenOrders();
  logOp((action==='approved'?'通过':'驳回')+'补货单',orderId);
  clsModal();
  renderReplenView(currentView.view||'pending');
  showToast((action==='approved'?'✅ 已通过':'❌ 已驳回')+' 补货单 '+orderId);
}

function withdrawRO(orderId){
  var order=replenOrders.find(function(o){return o._id===orderId;});
  if(!order)return;
  if(order.status!=='pending'){showToast('⚠️ 仅待审核状态的补货单可撤回');return;}
  if(!confirm('确定撤回「'+order._id+'」的审核申请？\n撤回后可重新编辑再提交。'))return;
  updateReplenOrder(orderId,{status:'draft',_submitted:null});
  logOp('撤回补货单',orderId);
  clsModal();
  renderReplenView(currentView.view||'myOrders');
  showToast('↩️ 补货单已撤回，可重新编辑');
}

function exportRO(){

  var csv='单号,部门,状态,SKU数,总数量,总金额,创建时间,提交时间,审核人,审核意见\n';
  orders.forEach(function(o){

    csv+=[o._id,o.dept,o.status,o.items.length,totalQty,totalVal,new Date(o._created).toLocaleString('zh-CN'),o._submitted?new Date(o._submitted).toLocaleString('zh-CN'):'',o._reviewer||'',o._reviewNote||''].join(',')+'\n';

function initSKUColSort(){
  setTimeout(function(){
    var tables=document.querySelectorAll("table");
    tables.forEach(function(tbl){
      var ths=tbl.querySelectorAll("th");
      ths.forEach(function(th){
        if(th._sortBound)return;
        th._sortBound=true;
        th.style.cursor="pointer";
        th.title="点击排序";
        th.onclick=function(){
          var txt=(this.textContent||"").split(chr(10)).join("").trim();
          if(!txt)return;
          var fieldMap={"SKU":"SKU","SPU":"spu","预估日销":"预估日销","总库存":"总库存",
            "国内在制":"国内在制","国内现货":"国内现货","国内总库存":"国内总库存",
            "FBA在途":"FBA在途数量","FBA在库":"FBA在库数量","fbm可售":"fbm可售",
            "7天日均":"7天日均销量","14天日均":"14天日均销量","30天日均":"30天日均销量",
            "海外现货":"海外现货货值","海外在途":"海外在途货值",
            "国内现货货值":"国内现货货值","国内在制货值":"国内在制货值",
            "0-30天":"0-30天库龄数量","31-60天":"31-60天库龄数量"};
          var field=null;
          for(var k in fieldMap){if(txt.indexOf(k)>=0){field=fieldMap[k];break;}}
          if(!field){return;}
          sortSKUByField(field);

function chr(c){return String.fromCharCode(c);}
function sortSKUByField(field){
  if(skuSort.col===field)skuSort.dir=-skuSort.dir;else{skuSort.col=field;skuSort.dir=1;}
  var lv=currentView.level,dept=currentView.dept,store=currentView.store,spu=currentView.spu;
  var f=skuData.slice();
  if(dept)f=f.filter(function(r){return r["部门"]===dept;});
  if(store)f=f.filter(function(r){return r["店铺"]===store;});
  if(spu)f=f.filter(function(r){return r["spu"]===spu;});
  f.sort(function(a,b){var va=a[field]||0,vb=b[field]||0;return (va-vb)*skuSort.dir;});
  var c=document.getElementById("mainContent");
  var a=agg(f);
  c.innerHTML=renderAlerts(getAlerts())+kpis(a)+charts(f)+skuTbl(f);
  setTimeout(function(){initCharts(f);initSKUColSort();},50);
  showToast((skuSort.dir>0?"升序":"降序")+" "+field);
}
function filterSKUTable(type){
  var lv=currentView.level,dept=currentView.dept,store=currentView.store,spu=currentView.spu;
  var f=skuData.slice();
  if(dept)f=f.filter(function(r){return r["部门"]===dept;});
  if(store)f=f.filter(function(r){return r["店铺"]===store;});
  if(spu)f=f.filter(function(r){return r["spu"]===spu;});
  if(type==="滞销"){f=f.filter(function(r){var d=r["在库+在途DOS_30d"]||r["FBA可售DOS"]||r["国内库存DOS"]||0;return d>90;});}
  else if(type==="断货"){f=f.filter(function(r){return ((r["FBA在库数量"]||0)+(r["fbm可售"]||0))<=0;});}
  else if(type==="长库龄"){f=f.filter(function(r){return (r["大于180天库存合计"]||0)>0;});}
  else if(type==="低DOS"){f=f.filter(function(r){var d=r["FBA可售DOS"]||r["国内库存DOS"]||0;return d>0&&d<7;});}
  if(f.length===0){showToast("筛选 "+type+": 无匹配SKU");return;}
  var c=document.getElementById("mainContent");
  var a=agg(f);
  c.innerHTML=renderAlerts(getAlerts())+kpis(a)+charts(f)+skuTbl(f);
  setTimeout(function(){initCharts(f);initSKUColSort();},50);
  showToast("筛选: "+type+" ("+f.length+"条)");
}

  // ===== 第1步：检测XLSX库是否成功加载 =====
  if(typeof XLSX==='undefined'){
    alert('❌ XLSX解析库加载失败！\n\n可能原因：\n1. 网络不通，CDN资源无法下载\n2. 防火墙/安全软件拦截\n\n解决方法：\n• 检查网络连接，刷新页面重试\n• 如持续失败，联系管理员将XLSX库下载到本地');
    input.value='';
    return;
  }

  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var wb=XLSX.read(e.target.result,{type:'array'});
      var ws=wb.Sheets[wb.SheetNames[0]];
      var rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});

      if(rows.length<2){alert('Excel文件为空或格式不正确！');input.value='';return;}

      // Detect header row (first row)
      var header=rows[0];
      // Map column index to field name
      var colMap={};
      TEMPLATE_COLS.forEach(function(col){
        for(var i=0;i<header.length;i++){
          if(String(header[i]).trim()===col){colMap[col]=i;break;}
        }
      });

      // Check required columns
      var missing=[];
      ['SKU','spu','店铺','部门'].forEach(function(c){
        if(!(c in colMap))missing.push(c);
      });
      if(missing.length>0){
        alert('Excel缺少必填列: '+missing.join(', ')+'\n\n请使用"下载模板"获取正确格式。');
        input.value='';return;
      }

      // Parse data rows (skip header)
      var newData=[];
      for(var r=1;r<rows.length;r++){
        var row=rows[r];
        if(!row[colMap['SKU']]&&!row[colMap['spu']])continue; // skip empty rows

        var item={};
        TEMPLATE_COLS.forEach(function(col){
          var idx=colMap[col];
          if(idx!==undefined&&idx<row.length){
            item[col]=row[idx];
          }else{
            item[col]='';
          }
        });
        newData.push(item);
      }

      if(newData.length===0){alert('未解析到有效数据行！');input.value='';return;}

      // Duplicate detection + preview
      var newSKUs=0,dupSKUs=0;
      var existingSKUs={};skuData.forEach(function(r){existingSKUs[r.SKU]=r;});
      newData.forEach(function(r){if(existingSKUs[r.SKU])dupSKUs++;else newSKUs++;});
      // 判断当前用户身份：部门用户只能覆盖自己部门，管理员可以全局替换
      var auth0=getAuth();var isAdmin0=auth0&&auth0.isAdmin;var authDept0=auth0&&!isAdmin0?auth0.dept:null;
      var replaceLabel=isAdmin0?'全部替换当前数据':'替换【'+authDept0+'】的旧数据（其他部门不受影响）';
      var choice=confirm('📥 导入预览\n\n共 '+newData.length+' 条数据\n  🆕 新增: '+newSKUs+' 条\n  🔄 重复SKU: '+dupSKUs+' 条\n  📦 当前已有: '+skuData.length+' 条\n  👤 当前身份: '+(isAdmin0?'管理员':authDept0)+'\n\n点「确定」= '+replaceLabel+'\n点「取消」= 跳过重复SKU，仅导入新数据');
      if(!choice){
        // Skip duplicates
        var filteredNew=[];
        newData.forEach(function(r){if(!existingSKUs[r.SKU])filteredNew.push(r);});
        if(filteredNew.length===0){alert('所有SKU均为重复，未导入任何数据。');input.value='';return;}
        newData=filteredNew;
      }

      // Merge data
      if(choice){
        if(isAdmin0){
          // 管理员：全局替换
          skuData=newData;
        }else{
          // 部门用户：只替换自己部门的SKU，保留其他部门数据
          var otherDepts=skuData.filter(function(r){return r['部门']!==authDept0;});
          skuData=otherDepts.concat(newData);
        }
      }else{
        // Append new SKUs to existing data
        skuData=skuData.concat(newData);
      }
      skuData.forEach(function(r,i){
        TEMPLATE_COLS.slice(8).forEach(function(k){r[k]=Number(r[k])||0;});
        r['历年同时期日销']=Number(r['历年同时期日销'])||r['30天日均销量']||0;
        calcDOS(r);
        r._id=i;
        r._orig=JSON.parse(JSON.stringify(r));
      });

      saveData();
      rebuildAll();
      showToast('✅ 成功导入 '+(choice?'':'新增')+newData.length+' 条，当前共 '+skuData.length+' 条SKU！');
    }catch(err){
      var detail='';
      if(err.message.indexOf('XLSX')>=0||err.message.indexOf('undefined')>=0){
        detail='【XLSX库问题】\nXLSX解析库未正确加载，请刷新页面后重试。\n';
      }else if(err.message.indexOf('Sheet')>=0||err.message.indexOf('sheet')>=0){
        detail='【工作表问题】\n请确保Excel文件包含名为"库存数据模板"的工作表。\n';
      }else if(err.message.indexOf('header')>=0||err.message.indexOf('column')>=0){
        detail='【列名不匹配】\n请使用"下载模板"按钮生成的Excel模板，不要修改表头。\n';
      }
      alert('❌ 导入失败！\n\n错误详情: '+err.message+'\n\n'+detail+'💡 建议:\n1. 使用「下载模板」按钮获取标准模板\n2. 在模板中填写数据后重新导入\n3. 确认Excel文件未被WPS/Office修改表头列名');
      console.error('Import error:',err);
    }
    input.value='';
  };
  reader.readAsArrayBuffer(file);
}

function renameEntity(type,oldName,dept,store){
  var labels={dept:"部门",store:"店铺",spu:"SPU"};
  var newName=prompt("修改"+labels[type]+"名称:",oldName);
  if(!newName||newName===oldName)return;
  var field=type==="dept"?"部门":type==="store"?"店铺":"spu";
  var count=0;
  skuData.forEach(function(r){
    if(type==="dept"&&r["部门"]===oldName){r["部门"]=newName;count++;}
    else if(type==="store"&&r["部门"]===dept&&r["店铺"]===oldName){r["店铺"]=newName;count++;}
    else if(type==="spu"&&r["部门"]===dept&&r["店铺"]===store&&r["spu"]===oldName){r["spu"]=newName;count++;}
  });
  if(count>0){
    logOp("重命名"+labels[type],oldName+" -> "+newName+" ("+count+"条SKU)");
    autoSave();
    rebuildAll();
    showToast("已更新 "+count+" 条SKU: "+oldName+" -> "+newName);
  }
}

function rebuildAll(){
  // Re-assign IDs — 同时清除旧的复选框状态（因为 _id 变了）
  window._alertChecks = {};
  saveAlertChecks();
  skuData.forEach(function(r,i){r._id=i;});
  // Sync new departments to password store
  loadPasswords();
  // Rebuild nav tree
  initNav();
  // Reset current view to top level if current selection no longer exists
  var depts=grpBy('部门',skuData);
  if(currentView.dept&&!depts[currentView.dept]){currentView={level:'dept',dept:null,store:null,spu:null};}
  else if(currentView.store){
    var stores=grpBy('店铺',skuData.filter(function(r){return r['部门']===currentView.dept;}));
    if(!stores[currentView.store]){currentView={level:'dept',dept:currentView.dept,store:null,spu:null};}
    else if(currentView.spu){
      var spus=grpBy('spu',skuData.filter(function(r){return r['部门']===currentView.dept&&r['店铺']===currentView.store;}));
      if(!spus[currentView.spu]){currentView={level:'store',dept:currentView.dept,store:currentView.store,spu:null};}
    }
  }
  refresh();
  // Re-select active nav item
  setTimeout(function(){
    var sel='.nav-item[data-level="'+currentView.level+'"]';
    if(currentView.dept)sel+='[data-dept="'+esc(currentView.dept)+'"]';
    if(currentView.store)sel+='[data-store="'+esc(currentView.store)+'"]';
    if(currentView.spu)sel+='[data-spu="'+esc(currentView.spu)+'"]';
    var el=document.querySelector(sel);
    if(el){
      document.querySelectorAll('.nav-item').forEach(function(n){n.classList.remove('active');});
      el.classList.add('active');
      // Expand parents
      var p=el.parentElement;
      while(p&&p.classList.contains('nav-children')){
        var item=p.parentElement;
        if(item&&item.classList.contains('nav-item'))item.classList.add('expanded');
        p=item?item.parentElement:null;
      }
    }
  },100);
}

    '海外现货货值','海外在途货值','国内现货货值','国内在制货值',
    '0-30天库龄数量','31-60天库龄数量','61-90天库龄数量','91-180天库龄数量',
    '181-270天库龄数量','271-330天库龄数量','331-365天库龄数量','大于365天库龄数量','大于180天库存合计','历年同时期日销'];
  var csv=cols.join(',')+'\n';
  f.forEach(function(r){
    csv+=cols.map(function(c){
      var v=r[c];
      if(v===null||v===undefined)return'';
      if(typeof v==='object'&&v.lb)return v.lb; // health object
      if(typeof v==='string'&&v.indexOf(',')>=0)return'"'+v+'"';
      return v;
    }).join(',')+'\n';
  });
  var blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='库存DOS健康度_'+new Date().toISOString().slice(0,10)+'.csv';a.click();
  URL.revokeObjectURL(a.href);showToast('📥 导出成功');
}

document.addEventListener('DOMContentLoaded',async function(){
  // 检测核心库是否加载成功
  if(typeof XLSX==='undefined'){
    console.warn('⚠️ XLSX库未加载！导入Excel功能将不可用。请检查网络连接。');
  }
  if(typeof Chart==='undefined'){
    console.warn('⚠️ Chart.js库未加载！图表功能将不可用。请检查网络连接。');
  }
  if(typeof firebase==='undefined'){
    console.warn('⚠️ Firebase SDK未加载！将使用本地存储模式。');
    _fireAvailable = false;
    _fireReady = true;
  }
  await fireInit(); // 从 Firestore 加载云端共享数据（不可用时立即返回）
  loadData();
  document.getElementById('searchInput').addEventListener('input',function(e){
    var q=e.target.value.toLowerCase().trim();
    if(!q){refresh();return;}
    var authData=getAuthData();
    var rs=authData.filter(function(r){return (r.SKU||'').toLowerCase().indexOf(q)>=0||(r.spu||'').toLowerCase().indexOf(q)>=0||(r.品名||'').toLowerCase().indexOf(q)>=0||(r.店铺||'').toLowerCase().indexOf(q)>=0||(r.部门||'').toLowerCase().indexOf(q)>=0;});
    var c=document.getElementById('mainContent');
    if(!rs.length){c.innerHTML='<div style="padding:40px;text-align:center;color:var(--text2)">🔍 未找到 "'+esc(q)+'"</div>';return;}
    c.innerHTML=renderAlerts(getAlerts())+kpis(agg(rs))+skuTbl(rs);
    setTimeout(function(){initCharts(rs);initSKUColSort();},50);
  });
  document.getElementById('editModal').addEventListener('click',function(e){if(e.target===this)clsModal();});
});

// ============================================================
// UTILS
// ============================================================
function fmt(n){if(n===null||n===undefined||isNaN(n))return'0';return Number(n).toLocaleString('zh-CN',{maximumFractionDigits:1});}
function fmtM(n){if(n===null||n===undefined||isNaN(n))return'$0';return'$'+Number(n).toLocaleString('zh-CN',{maximumFractionDigits:0});}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.className='toast ok';t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('show');},2500);}
</script>
